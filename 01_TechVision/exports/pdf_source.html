<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Noverra PDF export</title>
  <style>
    @page {
      size: 16in 9in;
      margin: 0;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: #000;
    }

    .page {
      width: 16in;
      height: 9in;
      page-break-after: always;
      break-after: page;
      overflow: hidden;
      background: #000;
    }

    .page:last-child {
      page-break-after: auto;
      break-after: auto;
    }

    img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>
<body>
  <section class="page"><img src="pptx_match_slides/slide_01.png" alt="Slide 01"></section>
  <section class="page"><img src="pptx_match_slides/slide_02.png" alt="Slide 02"></section>
  <section class="page"><img src="pptx_match_slides/slide_03.png" alt="Slide 03"></section>
  <section class="page"><img src="pptx_match_slides/slide_04.png" alt="Slide 04"></section>
  <section class="page"><img src="pptx_match_slides/slide_05.png" alt="Slide 05"></section>
  <section class="page"><img src="pptx_match_slides/slide_06.png" alt="Slide 06"></section>
  <section class="page"><img src="pptx_match_slides/slide_07.png" alt="Slide 07"></section>
  <section class="page"><img src="pptx_match_slides/slide_08.png" alt="Slide 08"></section>
  <section class="page"><img src="pptx_match_slides/slide_09.png" alt="Slide 09"></section>
  <section class="page"><img src="pptx_match_slides/slide_10.png" alt="Slide 10"></section>
</body>
</html>
